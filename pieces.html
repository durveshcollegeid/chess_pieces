
<html>

<style>
body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      font-family: Arial, sans-serif;
    }

    .chessboard {
      display: grid;
      grid-template-columns: repeat(8, 60px);
      grid-template-rows: repeat(8, 60px);
      border: 6px solid #333;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    .square {
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 45px;
      user-select: none;
    }

    .white {
      background-color: #f0d9b5;
    }

    .black {
      background-color: #b58863;
    }

    /* Optional: Add file and rank labels */
    .chessboard-container {
      position: relative;
    }

    .labels {
      position: absolute;
      font-size: 14px;
      color: #666;
    }

	
	
  </style>
<body>

<div id="choice_bar" >
	<div id="pawn" class="choice" >
	</div>
	<div id="horse" class="choice" >
	</div>
	<div id="camel" class="choice" >
	</div>
	<div id="elephant" class="choice" >
	</div>
	<div id="queen" class="choice" >
	</div>
	<div id="king" class="choice" >
	</div>
</div>

<div id="board" >


</div>



<script>
    const chessboard = document.getElementById('board');
    
    for (let row = 0; row < 8; row++) {
      for (let col = 0; col < 8; col++) {
        const square =  chessboard.createElement('div');
        square.classList.add('square');

        if ((row + col) % 2 === 0) {
          square.classList.add('white');
        } else {
          square.classList.add('black');
        }
        
        
        chessboard.appendChild(square);
      }
    }
  </script>
</body>



</html>
