<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chess Board</title>

<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    min-height: 100vh;
    margin: 0;
    background-color: #f0f0f0;
    font-family: Arial, sans-serif;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-template-rows: repeat(8, 60px);
    border: 6px solid #333;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  }

  .square {
    width: 60px;
    height: 60px;
  }

  .white {
    background-color: #f0d9b5;
  }

  .black {
    background-color: #b58863;
  }

  .choice_bar {
    display: flex;
    flex-direction: column;
    width: 120px;
    border: 2px solid #333;
  }

  .choice {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #999;
    cursor: pointer;
    background-color: #f5f5f5;
  }

  .choice:last-child {
    border-bottom: none;
  }

  .choice:hover {
    background-color: #ddd;
  }
</style>
</head>

<body>

<div id="choice_bar" class="choice_bar">
  <div id="king" class="choice">King</div>
  <div id="queen" class="choice">Queen</div>
  <div id="rook" class="choice">Rook</div>
  <div id="bishop" class="choice">Bishop</div>
  <div id="knight" class="choice">Knight</div>
  <div id="pawn" class="choice">Pawn</div>
</div>

<div id="board" class="board"></div>

<script>
  const chessboard = document.getElementById('board');

  for (let row = 0; row < 8; row++) {
    for (let col = 0; col < 8; col++) {
      const square = document.createElement('div'); // FIXED
      square.classList.add('square');

      if ((row + col) % 2 === 0) {
        square.classList.add('white');
      } else {
        square.classList.add('black');
      }

      chessboard.appendChild(square);
    }
  }
</script>

</body>
</html>
